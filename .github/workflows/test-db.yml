name: 🐘 PostgreSQL Tests

on:
  push:
    branches: [main, release/**, feature/**, refactor/**]
    tags: [v*]
    paths:
      - 'dbmodel/**'
      - 'giswater_admin/**'
      - '.github/workflows/test-db.yml'
  pull_request:
    branches: [main, release/**, feature/**, refactor/**]
    paths:
      - 'dbmodel/**'
      - 'giswater_admin/**'
      - '.github/workflows/test-db.yml'
  workflow_dispatch:
    inputs:
      tests:
        description: "Tests to run (all or schema|security|function|data|performance)"
        required: false
        default: "all"
      build_image:
        description: "Build/push DB image"
        required: false
        default: "false"

permissions:
  contents: read
  packages: write

jobs:
  db-bootstrap:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [ud, ws]
        pg_version: [16, 17, 18]

    env:
      PG_MAJOR: ${{ matrix.pg_version }}
      GW_VERBOSE: "1"
      GW_TIMING: "1"
      GW_SCHEMA_DUMP: /workspace/dbmodel/gw-schema-pg${{ matrix.pg_version }}-${{ matrix.project }}.dump

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show matrix
        run: echo "Bootstrap ${{ matrix.project }} on PostgreSQL ${{ matrix.pg_version }}"

      - name: Build Docker images
        working-directory: dbmodel
        run: docker compose -f docker-compose.test.yml build --quiet postgres runner

      - name: Start Postgres
        working-directory: dbmodel
        run: docker compose -f docker-compose.test.yml up -d postgres --wait

      - name: Bootstrap schema (giswater_admin create ci)
        working-directory: dbmodel
        run: |
          chmod +x test/*.sh
          docker compose -f docker-compose.test.yml run --rm -T runner \
            bash /workspace/dbmodel/test/bootstrap_inner.sh ${{ matrix.project }}

      - name: Dump schema for test jobs
        working-directory: dbmodel
        run: |
          docker compose -f docker-compose.test.yml run --rm -T runner \
            bash /workspace/dbmodel/test/dump_schema.sh ${{ matrix.project }}

      - name: Upload schema dump artifact
        uses: actions/upload-artifact@v4
        with:
          name: gw-schema-pg${{ matrix.pg_version }}-${{ matrix.project }}
          path: dbmodel/gw-schema-pg${{ matrix.pg_version }}-${{ matrix.project }}.dump
          retention-days: 2

      - name: Stop Postgres
        if: always()
        working-directory: dbmodel
        run: docker compose -f docker-compose.test.yml down

  db-test:
    needs: db-bootstrap
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [ud, ws]
        pg_version: [16, 17, 18]
        test_group: [schema, security, function, data, performance]

    env:
      PG_MAJOR: ${{ matrix.pg_version }}
      PG_PROVE_JOBS: "4"
      TEST_GROUPS: ${{ matrix.test_group }}
      GW_VERBOSE: "1"
      GW_TIMING: "1"
      GW_SCHEMA_DUMP: /workspace/dbmodel/gw-schema-pg${{ matrix.pg_version }}-${{ matrix.project }}.dump

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # matrix.* is not allowed in job-level if: — filter here for workflow_dispatch
      - name: Filter test group
        id: filter
        run: |
          active=true
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            req="${{ github.event.inputs.tests }}"
            if [[ "${req}" != "all" && "${req}" != "${{ matrix.test_group }}" ]]; then
              active=false
            fi
          fi
          echo "active=${active}" >> "${GITHUB_OUTPUT}"

      - name: Skip test group (not requested)
        if: steps.filter.outputs.active != 'true'
        run: echo "Skipping ${{ matrix.test_group }} (workflow_dispatch tests=${{ github.event.inputs.tests }})"

      - name: Show matrix
        if: steps.filter.outputs.active == 'true'
        run: echo "pgTAP ${{ matrix.test_group }} — ${{ matrix.project }} PostgreSQL ${{ matrix.pg_version }}"

      - name: Download schema dump
        if: steps.filter.outputs.active == 'true'
        uses: actions/download-artifact@v4
        with:
          name: gw-schema-pg${{ matrix.pg_version }}-${{ matrix.project }}
          path: dbmodel

      - name: Build Docker images
        if: steps.filter.outputs.active == 'true'
        working-directory: dbmodel
        run: docker compose -f docker-compose.test.yml build --quiet postgres runner

      - name: Start Postgres
        if: steps.filter.outputs.active == 'true'
        working-directory: dbmodel
        run: docker compose -f docker-compose.test.yml up -d postgres --wait

      - name: Restore schema from dump
        if: steps.filter.outputs.active == 'true'
        working-directory: dbmodel
        run: |
          chmod +x test/*.sh
          docker compose -f docker-compose.test.yml run --rm -T runner \
            bash /workspace/dbmodel/test/restore_inner.sh ${{ matrix.project }}

      - name: Run pgTAP (${{ matrix.test_group }})
        if: steps.filter.outputs.active == 'true'
        working-directory: dbmodel
        run: |
          docker compose -f docker-compose.test.yml run --rm -T runner \
            bash /workspace/dbmodel/test/prove_inner.sh ${{ matrix.project }}

      - name: Stop Postgres
        if: always() && steps.filter.outputs.active == 'true'
        working-directory: dbmodel
        run: docker compose -f docker-compose.test.yml down

  publish-gw-db:
    needs: [db-bootstrap, db-test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_image == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [ud, ws]
        pg_version: [16, 17, 18]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download schema dump
        uses: actions/download-artifact@v4
        with:
          name: gw-schema-pg${{ matrix.pg_version }}-${{ matrix.project }}
          path: dbmodel

      - name: Prepare dump for gw-db image
        working-directory: dbmodel
        run: cp "gw-schema-pg${{ matrix.pg_version }}-${{ matrix.project }}.dump" "gw_${{ matrix.project }}.dump"

      - name: Set image tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "IMAGE_TAG=main" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${GITHUB_REF_NAME//\//-}" >> $GITHUB_ENV
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve PostGIS version
        run: |
          if [ "${{ matrix.pg_version }}" = "18" ]; then
            echo "POSTGIS_VERSION=3.6" >> "$GITHUB_ENV"
          else
            echo "POSTGIS_VERSION=3.5" >> "$GITHUB_ENV"
          fi

      - name: Build and push DB image
        uses: docker/build-push-action@v6
        with:
          context: dbmodel
          file: dbmodel/docker/gw-db/Dockerfile
          push: true
          tags: ghcr.io/giswater/gw-db:${{ env.IMAGE_TAG }}-pg${{ matrix.pg_version }}-${{ matrix.project }}
          build-args: |
            GW_DUMP=gw_${{ matrix.project }}.dump
            PG_MAJOR=${{ matrix.pg_version }}
            POSTGIS_VERSION=${{ env.POSTGIS_VERSION }}
