name: 🐘 PostgreSQL Tests

on:
  push:
    branches: [main, release/**, feature/**, refactor/**]
    tags: [v*]
    paths:
      - 'dbmodel/**'
      - 'giswater_admin/**'
      - '.github/workflows/test-db.yml'
  pull_request:
    branches: [main, release/**, feature/**, refactor/**]
    paths:
      - 'dbmodel/**'
      - 'giswater_admin/**'
      - '.github/workflows/test-db.yml'
  workflow_dispatch:
    inputs:
      tests:
        description: "Tests to run"
        required: false
        default: "all"
      build_image:
        description: "Build/push DB image"
        required: false
        default: "false"

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [ud, ws]
        pg_version: [16, 17, 18]

    env:
      PG_MAJOR: ${{ matrix.pg_version }}
      PG_PROVE_JOBS: "4"
      TEST_GROUPS: ${{ github.event.inputs.tests || 'all' }}
      GW_SCHEMA: ${{ format('{0}_40', matrix.project) }}
      GW_VERBOSE: "1"
      GW_TIMING: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show matrix
        run: echo "Testing ${{ matrix.project }} on PostgreSQL ${{ matrix.pg_version }}"

      - name: Run database tests
        working-directory: dbmodel
        run: |
          chmod +x test/run_tests.sh test/run_tests_inner.sh
          REF="${{ github.ref }}"
          if [[ "${REF}" == "refs/heads/main" || "${REF}" == refs/tags/v* \
             || "${{ github.event.inputs.build_image }}" == "true" ]]; then
            export GW_DUMP_PATH="/workspace/dbmodel/gw_${{ matrix.project }}.dump"
          fi
          ./test/run_tests.sh ${{ matrix.project }}

      - name: Upload schema dump
        if: success() && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_image == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: gw-dump-pg${{ matrix.pg_version }}-${{ matrix.project }}
          path: dbmodel/gw_${{ matrix.project }}.dump
          retention-days: 7

  publish-gw-db:
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_image == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [ud, ws]
        pg_version: [16, 17, 18]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download schema dump
        uses: actions/download-artifact@v4
        with:
          name: gw-dump-pg${{ matrix.pg_version }}-${{ matrix.project }}
          path: dbmodel

      - name: Set image tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "IMAGE_TAG=main" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${GITHUB_REF_NAME//\//-}" >> $GITHUB_ENV
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve PostGIS version
        run: |
          if [ "${{ matrix.pg_version }}" = "18" ]; then
            echo "POSTGIS_VERSION=3.6" >> "$GITHUB_ENV"
          else
            echo "POSTGIS_VERSION=3.5" >> "$GITHUB_ENV"
          fi

      - name: Build and push DB image
        uses: docker/build-push-action@v6
        with:
          context: dbmodel
          file: dbmodel/docker/gw-db/Dockerfile
          push: true
          tags: ghcr.io/giswater/gw-db:${{ env.IMAGE_TAG }}-pg${{ matrix.pg_version }}-${{ matrix.project }}
          build-args: |
            GW_DUMP=gw_${{ matrix.project }}.dump
            PG_MAJOR=${{ matrix.pg_version }}
            POSTGIS_VERSION=${{ env.POSTGIS_VERSION }}
