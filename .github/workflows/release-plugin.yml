name: 🚀 Release plugin

on:
  release:
    types: [published]

jobs:
  verify-dbmodel-ci:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Verify dbmodel CI checks on release commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/verify_dbmodel_ci_checks.sh --tag "${{ github.event.release.tag_name }}" --wait

  network-lockstep:
    if: startsWith(github.event.release.tag_name, 'v')
    uses: ./.github/workflows/e2e-giswater.yml
    with:
      scenario: update_network
      pg_version: "18"
      parent_profile: empty

  release:
    needs: [verify-dbmodel-ci, network-lockstep]
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v')
    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive
          path: ./giswater

      - name: Extract version from tag
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag $TAG is not a valid plugin release (expected vX.Y.Z)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create ZIP
        run: |
          zip -r giswater.zip giswater \
            -x '*/.git/*' '*/.github/*' '*__pycache__*' '*.pyc' \
               'giswater/scripts/*' 'giswater/test/*' \
               'giswater/dbmodel/test/*' 'giswater/dbmodel/docker/*' \
               'giswater/libs/tests/*'

      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: giswater.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install paramiko
        run: pip install paramiko

      - name: Deploy to download server via SFTP
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          python3 giswater/scripts/deploy_release.py \
            --version       "$VERSION" \
            --zip           giswater.zip \
            --template      giswater/scripts/plugin_template.xml \
            --gh-repo       ${{ github.repository }} \
            --gh-token      ${{ secrets.GITHUB_TOKEN }} \
            --sftp-host     ${{ secrets.SFTP_HOST }} \
            --sftp-user     ${{ secrets.SFTP_USER }} \
            --sftp-password '${{ secrets.SFTP_PASSWORD }}' \
            --sftp-base     ${{ secrets.SFTP_BASE }} \
            --base-url      ${{ secrets.DEPLOY_BASE_URL }}
