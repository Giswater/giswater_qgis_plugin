name: 🧵 Threaded DB calls check

on:
  push:
    paths-ignore:
      - 'dbmodel/**'
  pull_request:
    paths-ignore:
      - 'dbmodel/**'

jobs:
  check-threaded-db-calls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Run GwTask DB call checker
        run: |
          python test/scripts/check_thread_db_calls.py
