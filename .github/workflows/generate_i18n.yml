name: Generate i18n

on:
  workflow_dispatch:
    inputs:
      publish_mode:
        description: "latest = update translations/latest only; release = create version folder and update latest/"
        required: true
        default: latest
        type: choice
        options:
          - latest
          - release
      languages:
        description: "Comma-separated language codes, e.g. es_cr,es_es (empty = all from API)"
        required: false
        default: ""
      ref:
        description: "Plugin repo branch, tag or commit SHA (empty = default branch)"
        required: false
        default: ""
      version:
        description: "Plugin version X.Y.Z — only used when publish_mode=release (empty = metadata.txt)"
        required: false
        default: ""
  schedule:
    - cron: "0 2 * * *"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  generate-i18n:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          TRANSLATIONS_API_URL: ${{ secrets.TRANSLATIONS_API_URL }}
          TRANSLATIONS_API_USER: ${{ secrets.TRANSLATIONS_API_USER }}
          TRANSLATIONS_API_PASSWORD: ${{ secrets.TRANSLATIONS_API_PASSWORD }}
          I18N_BOT_APP_CLIENT_ID: ${{ secrets.I18N_BOT_APP_CLIENT_ID }}
          I18N_BOT_APP_PRIVATE_KEY: ${{ secrets.I18N_BOT_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=()
          required_secrets=(
            TRANSLATIONS_API_URL
            TRANSLATIONS_API_USER
            TRANSLATIONS_API_PASSWORD
            I18N_BOT_APP_CLIENT_ID
            I18N_BOT_APP_PRIVATE_KEY
          )

          for secret in "${required_secrets[@]}"; do
            [ -z "${!secret}" ] && missing+=("$secret")
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Checkout giswater_qgis_plugin repository
        uses: actions/checkout@v6
        with:
          repository: Giswater/giswater_qgis_plugin
          ref: ${{ github.event.inputs.ref || github.ref }}
          path: giswater_qgis_plugin

      - name: Download translation ZIP files
        working-directory: giswater_qgis_plugin
        env:
          LANG_CODE: ${{ github.event.inputs.languages }}
          TRANSLATIONS_API_URL: ${{ secrets.TRANSLATIONS_API_URL }}
          TRANSLATIONS_API_USER: ${{ secrets.TRANSLATIONS_API_USER }}
          TRANSLATIONS_API_PASSWORD: ${{ secrets.TRANSLATIONS_API_PASSWORD }}
        run: |
          set -euo pipefail
          pip install requests
          python3 scripts/export_i18n_zips.py \
            --base-url "$TRANSLATIONS_API_URL" \
            --user "$TRANSLATIONS_API_USER" \
            --password "$TRANSLATIONS_API_PASSWORD" \
            --languages-json-out ../artifacts/languages.json \
            --output-dir ../artifacts/i18n

      - name: Generate GitHub App token
        id: translations-app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.I18N_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.I18N_BOT_APP_PRIVATE_KEY }}
          owner: Giswater
          repositories: translations
          permission-contents: write

      - name: Checkout translations repository
        uses: actions/checkout@v6
        with:
          repository: Giswater/translations
          token: ${{ steps.translations-app-token.outputs.token }}
          path: translations
          persist-credentials: false

      - name: Get GitHub App bot identity
        id: app-bot
        env:
          GH_TOKEN: ${{ steps.translations-app-token.outputs.token }}
        run: |
          set -euo pipefail
          APP_SLUG="${{ steps.translations-app-token.outputs.app-slug }}"
          USER_ID="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Publish ZIP files to translations repository
        id: publish
        env:
          BOT_NAME: ${{ steps.app-bot.outputs.name }}
          BOT_EMAIL: ${{ steps.app-bot.outputs.email }}
          GH_TOKEN: ${{ steps.translations-app-token.outputs.token }}
          EVENT_NAME: ${{ github.event_name }}
          PUBLISH_MODE: ${{ github.event.inputs.publish_mode || 'latest' }}
          VERSION_INPUT: ${{ github.event.inputs.version || '' }}
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          set -euo pipefail
          SOURCE_DIR="artifacts/i18n"
          LANGUAGES_JSON="artifacts/languages.json"
          TARGET_REPO="translations"

          if [ ! -d "$SOURCE_DIR" ] || [ -z "$(find "$SOURCE_DIR" -maxdepth 1 -name '*.zip' -print -quit)" ]; then
            echo "::error::No ZIP files were generated in $SOURCE_DIR"
            exit 1
          fi
          if [ ! -f "$LANGUAGES_JSON" ]; then
            echo "::error::languages.json was not generated in $LANGUAGES_JSON"
            exit 1
          fi

          PUBLISH_RELEASE=false
          if [ "$EVENT_NAME" = "release" ] || [ "$PUBLISH_MODE" = "release" ]; then
            PUBLISH_RELEASE=true
          fi

          mkdir -p "$TARGET_REPO/latest"
          cp "$SOURCE_DIR"/*.zip "$TARGET_REPO/latest/"
          cp "$LANGUAGES_JSON" "$TARGET_REPO/latest/languages.json"
          GIT_PATHS=(latest)
          COMMIT_MSG="chore(i18n): update latest translation ZIPs"

          if [ "$PUBLISH_RELEASE" = "true" ]; then
            VERSION="$VERSION_INPUT"
            if [ -z "$VERSION" ] && [ "$EVENT_NAME" = "release" ]; then
              VERSION="${RELEASE_TAG#v}"
            fi
            if [ -z "$VERSION" ]; then
              VERSION="$(awk -F= '/^version=/{print $2; exit}' giswater_qgis_plugin/metadata.txt)"
            fi
            if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Invalid version '$VERSION'. Expected format X.Y.Z"
              exit 1
            fi

            IFS='.' read -r major minor patch <<< "$VERSION"
            VERSION_PATH="${major}/${minor}/${patch}"
            echo "Release publish: creating version ${VERSION} and updating latest/."

            python3 - "$VERSION" <<'PY'
          import json
          import sys
          from pathlib import Path

          repo = Path("translations")
          current = tuple(int(part) for part in sys.argv[1].split("."))
          versions = {current}

          for path in repo.glob("[0-9]*/*/*"):
              parts = path.relative_to(repo).parts
              if path.is_dir() and len(parts) == 3 and all(part.isdigit() for part in parts):
                  versions.add(tuple(int(part) for part in parts))

          Path("artifacts/versions.json").write_text(
              json.dumps([".".join(map(str, version)) for version in sorted(versions)], indent=2)
              + "\n",
              encoding="utf-8",
          )
          PY

            mkdir -p "$TARGET_REPO/$VERSION_PATH"
            cp "$SOURCE_DIR"/*.zip "$TARGET_REPO/$VERSION_PATH/"
            cp "$LANGUAGES_JSON" "$TARGET_REPO/$VERSION_PATH/languages.json"
            cp artifacts/versions.json "$TARGET_REPO/versions.json"
            GIT_PATHS=(versions.json "$VERSION_PATH" latest)
            COMMIT_MSG="chore(i18n): update translation ZIPs for v${VERSION}"
          else
            echo "${EVENT_NAME} trigger (publish_mode=${PUBLISH_MODE}): updating latest/ only."
          fi

          cd "$TARGET_REPO"
          git config user.name "$BOT_NAME"
          git config user.email "$BOT_EMAIL"
          gh auth setup-git
          git add "${GIT_PATHS[@]}"

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "$COMMIT_MSG"
          git push origin HEAD

      - name: Cleanup GitHub App session
        if: always()
        run: |
          set -euo pipefail
          if [ -d translations/.git ]; then
            git -C translations config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
            git -C translations config --local --unset-all credential.helper 2>/dev/null || true
          fi
          unset GH_TOKEN
