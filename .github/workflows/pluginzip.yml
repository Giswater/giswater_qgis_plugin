name: Build and Upload Plugin

on:
  # Manual trigger
  workflow_dispatch:
  # Trigger on release creation
  release:
    types:
      - created

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Clone repo with submodules
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: ./giswater

      # 2. Generate build metadata used by "About" dialog
      - name: Generate build info
        working-directory: ./giswater
        run: |
          PLUGIN_SHA="$(git rev-parse --short=12 HEAD)"
          LIBS_SHA="$(git -C libs rev-parse --short=12 HEAD 2>/dev/null || echo N/A)"
          DBMODEL_SHA="$(git -C dbmodel rev-parse --short=12 HEAD 2>/dev/null || echo N/A)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          cat > build_info.json <<EOF
          {
            "plugin_commit": "${PLUGIN_SHA}",
            "libs_commit": "${LIBS_SHA}",
            "dbmodel_commit": "${DBMODEL_SHA}",
            "github_sha": "${GITHUB_SHA}",
            "github_ref": "${GITHUB_REF}",
            "github_run_id": "${GITHUB_RUN_ID}",
            "build_date_utc": "${BUILD_DATE}"
          }
          EOF

      # 2. Create ZIP
      - name: Create ZIP
        if: github.event_name == 'release'
        run: |
          zip -r giswater.zip .

      # 3. Upload plugin as artifact (for manual runs)
      - name: Upload plugin artifact
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: giswater
          path: "."
          include-hidden-files: true

      # 4. Upload ZIP plugin to release (for release triggers)
      - name: Upload ZIP plugin to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: giswater.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
