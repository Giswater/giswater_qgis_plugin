# Water-supply schema manifest.
#
# Mirrors the legacy admin_btn `create_project_data_schema` flow:
#   load_base -> updates -> lastprocess -> [sample | inv] -> final_pass
#
# Template variables resolved at runtime from BuildParams.as_ctx():
#   schema_name, srid, locale, plugin_version, project_version,
#   run_mode, db_user, today, profile, ...
#
# File-content substitutions (engine-baseline, see BuildParams.base_subs):
#   SCHEMA_NAME, SRID_VALUE, AUX_SCHEMA_NAME

kind: ws
engine_version: 1

substitutions: {}

phases:
  - id: load_base
    type: sql_dir
    description: "DDL + common functions/triggers + ws functions/triggers + ws schema_model"
    steps:
      - { source: "schemas/network/common/ddl",  recursive: false }
      - { source: "schemas/network/common/fct",  recursive: false }
      - { source: "schemas/network/common/ftrg", recursive: false }
      - { source: "schemas/network/ws/fct",          recursive: false }
      - { source: "schemas/network/ws/ftrg",         recursive: false }
      - { source: "schemas/network/ws/schema_model", recursive: false }

  - id: reload_fct_ftrg
    type: sql_dir
    description: "Re-apply functions and triggers (no DDL, no schema_model)."
    steps:
      - { source: "schemas/network/common/fct",  recursive: false }
      - { source: "schemas/network/common/ftrg", recursive: false }
      - { source: "schemas/network/ws/fct",      recursive: false }
      - { source: "schemas/network/ws/ftrg",     recursive: false }

  - id: updates
    type: version_walk
    description: "Apply update patches per version, common first then ws."
    roots:
      - "schemas/network/common/updates"
      - "schemas/network/ws/updates"
    range:
      mode: "{{ run_mode }}"

  - id: lastprocess
    type: sql_function
    description: "Server-side bookkeeping; requires fct/ftrg loaded."
    function: "{{ schema_name }}.gw_fct_admin_schema_lastprocess"
    payload:
      client:
        device: 4
        lang: "{{ locale }}"
      data:
        isNewProject: "TRUE"
        gwVersion: "{{ plugin_version }}"
        projectType: "WS"
        epsg: "{{ srid }}"
        descript: "{{ schema_name }}"
        name: "{{ schema_name }}"
        author: "{{ db_user }}"
        date: "{{ today }}"

  - id: lastprocess_upgrade
    type: sql_function
    description: "Bookkeeping for the upgrade profile (isNewProject=FALSE)."
    function: "{{ schema_name }}.gw_fct_admin_schema_lastprocess"
    payload:
      client:
        device: 4
        lang: "{{ locale }}"
      data:
        isNewProject: "FALSE"
        gwVersion: "{{ plugin_version }}"
        projectType: "WS"
        epsg: "{{ srid }}"

  - id: load_sample
    type: sql_dir
    optional: true
    description: "Sample 'user' data for ws."
    steps:
      - { source: "schemas/network/sample/user/ws", recursive: false }

  - id: load_inv
    type: sql_dir
    optional: true
    description: "Inventory-only fixtures on top of sample. v1 = subtractive."
    steps:
      - { source: "schemas/network/sample/inv/ws", recursive: false }

  - id: load_dev
    type: sql_dir
    optional: true
    description: "Dev fixtures. Reachable via CLI --profile dev."
    steps:
      - { source: "schemas/network/sample/dev/ws", recursive: false }

  - id: final_pass
    type: sql_dir
    description: "Form fields + i18n. Falls back to en_US when locale folder missing."
    steps:
      - source: "schemas/network/ws/final_pass/config_form_fields"
        recursive: false
      - source: "schemas/network/ws/final_pass/i18n/{{ locale }}"
        fallback_source: "schemas/network/ws/final_pass/i18n/en_US"
        recursive: false

profiles:
  empty:
    phases: [load_base, updates, lastprocess, final_pass]
  sample_full:
    phases: [load_base, updates, lastprocess, load_sample, final_pass]
  sample_inv:
    phases: [load_base, updates, lastprocess, load_sample, load_inv, final_pass]
  dev:
    phases: [load_base, updates, lastprocess, load_dev, final_pass]
  ci:
    phases: [load_base, updates, lastprocess, load_sample, final_pass]
  update:
    # In-place upgrade. Set run_mode=upgrade to narrow the version walk to
    # project_version < v <= plugin_version.
    phases: [reload_fct_ftrg, updates, lastprocess_upgrade]
