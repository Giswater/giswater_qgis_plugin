# Corporate cibs schema manifest.
#
# `schemas/addon/cibs/base/` bootstraps the shared `cibs` schema.
# `integrate_cibs` runs against a parent ws OR ud schema.

kind: cibs
engine_version: 1

substitutions: {}

phases:
  - id: load_base_schema
    type: sql_dir
    description: "Bootstrap cibs schema: base."
    steps:
      - { source: "schemas/addon/cibs/base/base.sql",  recursive: false }
      - { source: "schemas/addon/cibs/base/fct/",  recursive: false }

  - id: integrate_cibs
    type: sql_dir
    description: "Integrate cibs with the parent schema (ws/ud)."
    steps:
      - source: "schemas/addon/cibs/integration/{{parent_type}}/integration.sql"
        recursive: false
        schema_override: "{{ parent_schema }}"

  - id: updates
    type: version_walk
    description: "Apply cibs-specific update patches."
    root: "schemas/addon/cibs/updates"
    range:
      mode: "{{ run_mode }}"

  - id: register_version
    type: sql_function
    description: "Append sys_version row for cibs."
    function: "cibs.gw_fct_admin_sys_version_register"
    payload:
      client:
        lang: "{{ locale }}"
      data:
        gwVersion: "{{ plugin_version }}"
        projectType: "CIBS"
        isNewProject: "TRUE"
        inferParentsFromConfig: "FALSE"
        parentSchema: "{{ parent_schema }}"
        mergeAddparam: {}

profiles:
  empty:
    phases: [load_base_schema, updates, register_version]
  integrate:
    phases: [integrate_cibs, updates, register_version]
