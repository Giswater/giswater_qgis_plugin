# multilang schema manifest.
#
# Standalone translations repository. Local model stores one row per language
# (column `lang`) instead of the cloud wide-column layout.
#
# SQL: `schemas/addon/multilang/base/` + semver patches under `updates/`.

kind: multilang
engine_version: 1

substitutions: {}

phases:
  - id: load_base_schema
    type: sql_dir
    description: "Bootstrap multilang schema: init, functions, tables."
    steps:
      - { source: "schemas/addon/multilang/base/init.sql", recursive: false }
      - { source: "schemas/addon/multilang/base/fct", recursive: false }
      - { source: "schemas/addon/multilang/base/base.sql", recursive: false }
      - { source: "schemas/addon/multilang/base/tables", recursive: false }
      - { source: "schemas/addon/multilang/base/ftrg", recursive: false }

  - id: updates
    type: version_walk
    description: "Apply multilang-specific update patches."
    root: "schemas/addon/multilang/updates"
    range:
      mode: "{{ run_mode }}"

  - id: register_version
    type: sql_function
    description: "Append multilang.sys_version row."
    function: "multilang.gw_fct_admin_sys_version_register"
    payload:
      client:
        lang: "{{ locale }}"
      data:
        gwVersion: "{{ plugin_version }}"
        projectType: "MULTILANG"
        isNewProject: "{{ register_is_new }}"
        inferParentsFromConfig: "{{ infer_parents_from_config }}"
        parentSchema: "{{ register_parent_schema }}"
        mergeAddparam: {}

profiles:
  empty:
    phases: [load_base_schema, updates, register_version]
  update:
    phases: [updates, register_version]
  update_step:
    phases: [updates, register_version]
  version_bump:
    phases: [register_version]
