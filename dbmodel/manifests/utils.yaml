# utils (satellite) schema manifest.
#
# Decoupled lifecycle: create utils alone, integrate ws/ud separately,
# copy data from a selected parent schema.

kind: utils
engine_version: 1

substitutions: {}

phases:
  - id: load_base_schema
    type: sql_dir
    description: "Bootstrap utils schema DDL + functions."
    steps:
      - { source: "schemas/addon/utils/base/init.sql", recursive: false }
      - { source: "schemas/addon/utils/base/fct", recursive: false }
      - { source: "schemas/addon/utils/base/ftrg", recursive: false }
      - { source: "schemas/addon/utils/base/base.sql", recursive: false }


  - id: integrate_utils_ws
    type: sql_dir
    description: "Integrate utils with a ws parent schema."
    steps:
      - source: "schemas/addon/utils/integration/ws/integration.sql"
        recursive: false
        schema_override: "{{ ws_schema }}"

  - id: integrate_utils_ud
    type: sql_dir
    description: "Integrate utils with a ud parent schema."
    steps:
      - source: "schemas/addon/utils/integration/ud/integration.sql"
        recursive: false
        schema_override: "{{ ud_schema }}"

  - id: fk_ws
    type: sql_inline
    description: "Wire utils foreign keys into the ws schema."
    sql: "SELECT {{ ws_schema }}.gw_fct_admin_schema_utils_fk();"

  - id: fk_ud
    type: sql_inline
    description: "Wire utils foreign keys into the ud schema."
    sql: "SELECT {{ ud_schema }}.gw_fct_admin_schema_utils_fk();"

  - id: copy_data_utils
    type: sql_dir
    description: "Copy ext_* data from selected parent into utils."
    steps:
      - source: "schemas/addon/utils/data/data.sql"
        recursive: false
        schema_override: "{{ copy_source_schema }}"

  - id: role_perms
    type: sql_inline
    description: "Re-grant role permissions on ws parent."
    sql: "SELECT {{ ws_schema }}.gw_fct_admin_role_permissions();"

  - id: updates
    type: version_walk
    description: "Apply utils-specific update patches."
    root: "schemas/addon/utils/updates"
    range:
      mode: "{{ run_mode }}"

  - id: register_version
    type: sql_function
    description: "Append utils.sys_version row."
    function: "utils.gw_fct_admin_sys_version_register"
    payload:
      client:
        lang: "{{ locale }}"
      data:
        gwVersion: "{{ plugin_version }}"
        projectType: "UTILS"
        isNewProject: "{{ register_is_new }}"
        inferParentsFromConfig: "{{ infer_parents_from_config }}"
        parentSchema: "{{ register_parent_schema }}"
        mergeAddparam: {}

profiles:
  empty:
    phases: [load_base_schema, updates, register_version]
  integrate_ws:
    phases: [integrate_utils_ws, fk_ws, role_perms, register_version]
  integrate_ud:
    phases: [integrate_utils_ud, fk_ud, register_version]
  copy_data:
    phases: [copy_data_utils]
  update:
    phases: [updates, register_version]
