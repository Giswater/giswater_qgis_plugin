# Campaign-management schema manifest.
#
# cm attaches to a parent ws OR ud schema via integration/.

kind: cm
engine_version: 1

substitutions: {}

phases:
  - id: load_base_schema
    type: sql_dir
    description: "Bootstrap cm schema: base ddl/fct/ftrg."
    steps:
      - { source: "schemas/addon/cm/base/init.sql", recursive: false }
      - { source: "schemas/addon/cm/base/fct",  recursive: false }
      - { source: "schemas/addon/cm/base/ftrg", recursive: false }
      - { source: "schemas/addon/cm/base/base.sql", recursive: false }

  - id: integrate_cm
    type: sql_dir
    description: "Wire cm into the parent ws/ud schema."
    steps:
      - source: "schemas/addon/cm/integration/common/integration.sql"
        recursive: false
      - source: "schemas/addon/cm/integration/{{ parent_type }}/integration.sql"
        recursive: false
        schema_override: "{{ parent_schema }}"

  - id: load_sample
    type: sql_dir
    optional: true
    description: "Sample catalogues + parent-type-specific seed data."
    steps:
      - source: "schemas/addon/cm/sample/user"
        recursive: false
      - source: "schemas/addon/cm/integration/{{ parent_type }}/sample.sql"
        recursive: false
        schema_override: "{{ parent_schema }}"

  - id: load_updates
    type: version_walk
    optional: true
    description: "Walk dbmodel/schemas/addon/cm/updates/<M>/<m>/<p>/ semver-ordered."
    root: "schemas/addon/cm/updates"
    range:
      mode: "{{ run_mode }}"

  - id: load_locale
    type: sql_dir
    description: "cm i18n. Falls back to en_US when locale folder missing."
    steps:
      - source: "schemas/addon/cm/i18n/{{ locale }}"
        fallback_source: "schemas/addon/cm/i18n/en_US"
        recursive: false

  - id: register_version
    type: sql_function
    description: "Sync cm.sys_version from parent."
    function: "cm.gw_fct_admin_sys_version_register"
    payload:
      client:
        lang: "{{ locale }}"
      data:
        gwVersion: "{{ plugin_version }}"
        projectType: "CM"
        isNewProject: "TRUE"
        parentSchema: "{{ parent_schema }}"
        mergeAddparam: {}

profiles:
  empty:
    phases: [load_base_schema, integrate_cm, load_updates, load_locale, register_version]
  with_sample:
    phases: [load_base_schema, integrate_cm, load_sample, load_updates, load_locale, register_version]
  update:
    phases: [load_updates, load_locale, register_version]
