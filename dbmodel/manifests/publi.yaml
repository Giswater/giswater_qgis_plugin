# publi (satellite) schema manifest.
#
# Lifecycle: create publi alone, then integrate each ws/ud parent

kind: publi
engine_version: 1

substitutions: {}

phases:
  - id: load_base_schema
    type: sql_dir
    description: "Bootstrap publi schema DDL + functions."
    steps:
      - { source: "schemas/addon/publi/base/init.sql", recursive: false }
      - { source: "schemas/addon/publi/base/fct", recursive: false }
      - { source: "schemas/addon/publi/base/ftrg", recursive: false }
      - { source: "schemas/addon/publi/base/base.sql", recursive: false }


  # - id: integrate_publi_ws
  #   type: sql_dir
  #   description: "Integrate publi with a ws parent schema."
  #   steps:
  #     - source: "schemas/addon/publi/integration/ws/integration.sql"
  #       recursive: false
  #       schema_override: "{{ parent_schema }}"

  # - id: integrate_publi_ud
  #   type: sql_dir
  #   description: "Integrate publi with a ud parent schema."
  #   steps:
  #     - source: "schemas/addon/publi/integration/ud/integration.sql"
  #       recursive: false
  #       schema_override: "{{ parent_schema }}"

  - id: updates
    type: version_walk
    description: "Apply publi-specific update patches."
    root: "schemas/addon/publi/updates"
    range:
      mode: "{{ run_mode }}"

  - id: register_version
    type: sql_function
    description: "Append publi.sys_version row."
    function: "publi.gw_fct_admin_sys_version_register"
    payload:
      client:
        lang: "{{ locale }}"
      data:
        gwVersion: "{{ plugin_version }}"
        projectType: "publi"
        isNewProject: "{{ register_is_new }}"
        inferParentsFromConfig: "{{ infer_parents_from_config }}"
        parentSchema: "{{ register_parent_schema }}"
        parentKind: "{{ parent_type }}"
        mergeAddparam: {}

profiles:
  empty:
    phases: [load_base_schema, updates, register_version]
  # integrate_ws:
  #   phases: [integrate_publi_ws, register_version]
  # integrate_ud:
  #   phases: [integrate_publi_ud, register_version]
  update:
    phases: [updates, register_version]
  update_step:
    phases: [updates, register_version]
  version_bump:
    phases: [register_version]
